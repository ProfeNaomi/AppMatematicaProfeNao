<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometric Matrix: Fractal Math 💠</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00f3ff; --neon-pink: #ff00ff; --neon-yellow: #f0f000; --bg-dark: #050508; }
        body { 
            font-family: 'Share Tech Mono', monospace; 
            background-color: var(--bg-dark); 
            color: #fff; 
            margin: 0; padding: 0;
        }
        .title-font { font-family: 'Orbitron', sans-serif; }
        .glass-panel { 
            background: rgba(15, 15, 25, 0.9); 
            border: 1px solid rgba(0, 243, 255, 0.2);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }
        /* Grid de fondo tipo radar */
        .radar-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px; z-index: -1;
        }
        /* Contenedor principal a pantalla completa */
        .main-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            height: 100vh; gap: 1rem; padding: 1rem;
        }
        /* Estilo de la Matriz Geométrica */
        #geometry-canvas {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.4); border-radius: 20px;
            position: relative; overflow: hidden;
        }
        .matrix-cell {
            border: 1px solid rgba(0, 243, 255, 0.3);
            transition: all 0.4s ease;
        }
        .matrix-cell.filled { background: var(--neon-blue); box-shadow: inset 0 0 15px rgba(0,0,0,0.5); }
        .matrix-cell.overlap { background: var(--neon-pink); box-shadow: 0 0 20px var(--neon-pink); }
        
        input[type=range] { width: 100%; accent-color: var(--neon-blue); }
    </style>
</head>
<body>

    <div class="radar-bg"></div>

    <main class="main-layout">
        
        <aside class="glass-panel p-6 rounded-2xl flex flex-col gap-6 overflow-y-auto">
            <header>
                <h1 class="title-font text-2xl neon-text-blue text-cyan-400 italic font-black">GEOMETRIC MATRIX</h1>
                <p class="text-[10px] text-gray-500 tracking-[0.3em]">ANALYSIS MODULE // 2026</p>
            </header>

            <div class="flex gap-2">
                <button onclick="setMode('mult')" id="btn-mult" class="flex-1 py-2 rounded border border-cyan-500 bg-cyan-500/20 text-xs font-bold">MULTIPLICACIÓN</button>
                <button onclick="setMode('div')" id="btn-div" class="flex-1 py-2 rounded border border-gray-700 text-xs font-bold">DIVISIÓN</button>
            </div>

            <div class="p-4 bg-black/60 rounded border-l-2 border-cyan-400">
                <p class="text-[10px] text-cyan-400 mb-4">FACTOR ALFA (Eje X)</p>
                <div class="text-3xl title-font text-center mb-4" id="label-a">1 / 2</div>
                <input type="range" id="n1" min="1" max="10" value="1">
                <input type="range" id="d1" min="1" max="10" value="2" class="mt-4">
            </div>

            <div class="p-4 bg-black/60 rounded border-l-2 border-pink-400">
                <p class="text-[10px] text-pink-400 mb-4">FACTOR BETA (Eje Y)</p>
                <div class="text-3xl title-font text-center mb-4" id="label-b">1 / 3</div>
                <input type="range" id="n2" min="1" max="10" value="1">
                <input type="range" id="d2" min="1" max="10" value="3" class="mt-4">
            </div>

            <div class="mt-auto p-4 glass-panel rounded border-yellow-500/50">
                <p class="text-[10px] text-yellow-500 uppercase font-bold mb-2">Interpretación Lógica:</p>
                <p id="logic-text" class="text-xs text-gray-300 leading-relaxed"></p>
            </div>
        </aside>

        <section class="flex flex-col gap-4">
            <div id="geometry-canvas" class="glass-panel">
                <div id="matrix-container" style="display: grid; width: 80%; height: 80%;"></div>
            </div>
            
            <div class="h-32 glass-panel p-4 rounded-2xl flex items-center justify-around">
                <div class="text-center">
                    <p class="text-[10px] text-gray-500 uppercase">Numérica</p>
                    <div id="res-num" class="text-4xl title-font text-white">1 / 6</div>
                </div>
                <div class="h-full w-[1px] bg-gray-800"></div>
                <div class="text-center">
                    <p class="text-[10px] text-gray-500 uppercase">Decimal</p>
                    <div id="res-dec" class="text-4xl title-font text-cyan-400">0.166</div>
                </div>
            </div>
        </section>

    </main>

    <script>
        let mode = 'mult';
        
        function setMode(m) {
            mode = m;
            document.getElementById('btn-mult').className = m === 'mult' ? 'flex-1 py-2 rounded border border-cyan-500 bg-cyan-500/20 text-xs font-bold' : 'flex-1 py-2 rounded border border-gray-700 text-xs font-bold';
            document.getElementById('btn-div').className = m === 'div' ? 'flex-1 py-2 rounded border border-pink-500 bg-pink-500/20 text-xs font-bold' : 'flex-1 py-2 rounded border border-gray-700 text-xs font-bold';
            update();
        }

        function update() {
            const n1 = parseInt(document.getElementById('n1').value);
            const d1 = parseInt(document.getElementById('d1').value);
            const n2 = parseInt(document.getElementById('n2').value);
            const d2 = parseInt(document.getElementById('d2').value);

            document.getElementById('label-a').innerText = `${n1} / ${d1}`;
            document.getElementById('label-b').innerText = `${n2} / ${d2}`;

            const container = document.getElementById('matrix-container');
            container.innerHTML = '';

            if (mode === 'mult') {
                // MODELO DE ÁREA: La multiplicación es el área solapada
                container.style.gridTemplateColumns = `repeat(${d1}, 1fr)`;
                container.style.gridTemplateRows = `repeat(${d2}, 1fr)`;
                
                for (let r = 0; r < d2; r++) {
                    for (let c = 0; c < d1; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'matrix-cell';
                        if (c < n1 && r < n2) cell.classList.add('overlap');
                        else if (c < n1) cell.style.background = 'rgba(0, 243, 255, 0.1)';
                        else if (r < n2) cell.style.background = 'rgba(255, 0, 255, 0.1)';
                        container.appendChild(cell);
                    }
                }
                document.getElementById('res-num').innerText = `${n1 * n2} / ${d1 * d2}`;
                document.getElementById('res-dec').innerText = ((n1/d1)*(n2/d2)).toFixed(3);
                document.getElementById('logic-text').innerText = `Estamos calculando el ${n2}/${d2} partes de una unidad que ya estaba dividida en ${n1}/${d1}. El área rosa representa el producto final.`;
            } else {
                // MODELO DE DIVISIÓN: Cuántas veces cabe B en A
                // Simplificado: Visualizamos A y comparamos con B
                container.style.gridTemplateColumns = `repeat(${d1 * d2}, 1fr)`;
                container.style.gridTemplateRows = `repeat(2, 1fr)`;
                
                // Dibujar Fracción A arriba, B abajo
                const total = d1 * d2;
                for(let i=0; i < total*2; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'matrix-cell';
                    // Lógica visual de "comparación de tamaños"
                    container.appendChild(cell);
                }
                
                document.getElementById('res-num').innerText = `${n1 * d2} / ${d1 * n2}`;
                document.getElementById('res-dec').innerText = ((n1/d1)/(n2/d2)).toFixed(3);
                document.getElementById('logic-text').innerText = `Dividir es repartir. ¿Cuántas veces cabe la pieza ${n2}/${d2} en la pieza ${n1}/${d1}? El resultado indica esa proporción física.`;
            }
        }

        ['n1', 'd1', 'n2', 'd2'].forEach(id => document.getElementById(id).oninput = update);
        update();
    </script>
</body>
</html>
